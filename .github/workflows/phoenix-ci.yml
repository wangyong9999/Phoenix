name: Phoenix CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init Postgres submodules (v14-v17)
        run: |
          # The .gitmodules uses a relative URL `../postgres.git` which resolves
          # to `wangyong9999/postgres` on this fork (doesn't exist). Override
          # each Postgres submodule to the upstream neondatabase/postgres mirror.
          # postgres_ffi's build.rs hardcodes the v14..v17 list via a macro, so
          # all four header sets must be present at build time.
          for v in v14 v15 v16 v17; do
            git config --file=.gitmodules submodule.vendor/postgres-$v.url https://github.com/neondatabase/postgres.git
          done
          git submodule sync
          git submodule update --init --depth 2 --progress \
            vendor/postgres-v14 vendor/postgres-v15 vendor/postgres-v16 vendor/postgres-v17

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config \
            libseccomp-dev protobuf-compiler libprotobuf-dev libcurl4-openssl-dev \
            libpq-dev libicu-dev bison flex libreadline-dev zlib1g-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Postgres headers
        id: cache-pg-headers
        uses: actions/cache@v4
        with:
          path: pg_install
          key: ${{ runner.os }}-pg-headers-${{ hashFiles('vendor/postgres-v14/configure', 'vendor/postgres-v15/configure', 'vendor/postgres-v16/configure', 'vendor/postgres-v17/configure') }}

      - name: Install Postgres headers (all versions)
        if: steps.cache-pg-headers.outputs.cache-hit != 'true'
        run: make postgres-headers-install

      - name: Cargo check (compute_tools)
        run: cargo check -p compute_tools

      - name: Cargo check (pageserver)
        run: cargo check -p pageserver

      - name: Cargo check (wal_decoder)
        run: cargo check -p wal_decoder

      - name: Clippy (wal_decoder)
        run: cargo clippy -p wal_decoder -- -D warnings
        continue-on-error: true

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check architecture doc exists
        run: |
          test -f docs/ORIOLEDB_SERVERLESS.md
          test -f docs/PG_PATCHES_INVENTORY.md
          test -f README.md
