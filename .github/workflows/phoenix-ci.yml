name: Phoenix CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check & Clippy
    runs-on: ubuntu-latest
    env:
      # OrioleDB-Serverless only targets Postgres v17; skip v14/v15/v16 to avoid
      # depending on a fork of the Postgres submodule that doesn't exist under
      # the Phoenix namespace.
      POSTGRES_VERSIONS: v17
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init v17 submodule only
        run: |
          # The .gitmodules uses a relative URL `../postgres.git` which resolves
          # to `wangyong9999/postgres` on this fork (doesn't exist). Override
          # to the upstream neondatabase/postgres mirror for CI only.
          git config --file=.gitmodules submodule.vendor/postgres-v17.url https://github.com/neondatabase/postgres.git
          git submodule sync -- vendor/postgres-v17
          git submodule update --init --depth 2 --progress vendor/postgres-v17

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config \
            libseccomp-dev protobuf-compiler libprotobuf-dev libcurl4-openssl-dev \
            libpq-dev libicu-dev bison flex libreadline-dev zlib1g-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Postgres headers
        id: cache-pg-headers
        uses: actions/cache@v4
        with:
          path: pg_install
          key: ${{ runner.os }}-pg-headers-v17-${{ hashFiles('vendor/postgres-v17/configure') }}

      - name: Install Postgres v17 headers
        if: steps.cache-pg-headers.outputs.cache-hit != 'true'
        run: make postgres-headers-install-v17

      - name: Cargo check (compute_tools)
        run: cargo check -p compute_tools

      - name: Cargo check (pageserver)
        run: cargo check -p pageserver

      - name: Cargo check (wal_decoder)
        run: cargo check -p wal_decoder

      - name: Clippy (wal_decoder)
        run: cargo clippy -p wal_decoder -- -D warnings
        continue-on-error: true

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check architecture doc exists
        run: |
          test -f docs/ORIOLEDB_SERVERLESS.md
          test -f docs/PG_PATCHES_INVENTORY.md
          test -f README.md
